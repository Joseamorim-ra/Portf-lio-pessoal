<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Rodrigo Amorim</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <!-- Menu -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">Rodrigo Amorim</div>
            <ul class="menu">
                <li><a href="Index.html" class="nav-link">Sobre Mim</a></li>
                <li><a href="Formacao.html" class="nav-link">Formação</a></li>
                <li><a href="Portfolio.html" class="nav-link">Portfólio</a></li>
                <li><a href="Contato.html" class="nav-link">Contato</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contato -->
    <section id="contato" class="section">
        <div class="container">
            <h1>Entre em Contato</h1>
            <p class="form-subtitle">Preencha o formulário abaixo</p>
            
            <form id="contact-form" novalidate>
                <div class="form-group">
                    <input type="text" id="nome" placeholder="Seu Nome" required>
                    <span class="error-message" id="nome-error"></span>
                </div>
                
                <div class="form-group">
                    <input type="email" id="email" placeholder="Seu E-mail" required>
                    <span class="error-message" id="email-error"></span>
                </div>
                
                <div class="form-group">
                    <textarea id="mensagem" placeholder="Sua Mensagem" rows="6" required></textarea>
                    <span class="error-message" id="mensagem-error"></span>
                </div>
                
                <button type="submit" class="btn">Enviar Mensagem</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Rodrigo Amorim</p>
    </footer>
    
    <script src="Script.js"></script>
</body>
</html>
